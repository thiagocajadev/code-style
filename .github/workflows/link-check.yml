name: Link check

on:
  push:
    branches: [main]
    paths: ["**/*.md"]
  pull_request:
    paths: ["**/*.md"]

permissions:
  contents: read

jobs:
  internal-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # offline: valida só links e âncoras de arquivos locais; URLs externas ficam fora
      - name: Check internal links and anchors
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --include-fragments --no-progress "README.md" "CONTRIBUTING.md" "REFERENCES.md" "docs/**/*.md"
          fail: true
