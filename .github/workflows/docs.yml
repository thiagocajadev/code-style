name: Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code-style
        uses: actions/checkout@v6

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Select the languages to publish
        run: |
          set -e

          # Only these are published. Add a folder here to include it.
          LANGS="javascript csharp sql shared typescript html css"

          rm -rf site
          mkdir -p site

          for lang in $LANGS; do
            src="docs/$lang"
            if [ ! -d "$src" ]; then
              echo "::error::$lang: pasta ausente em docs/ — estrutura inválida"
              exit 1
            fi
            if [ -z "$(find "$src" -name '*.md' -print -quit)" ]; then
              echo "::error::$lang: nenhum .md encontrado — pasta vazia"
              exit 1
            fi
            cp -r "$src" "site/$lang"
          done

      # The renderer is a prebuilt image, so there is no checkout, no pnpm install and no node_modules
      # on the runner. `site` is mounted as the docs folder and `assets` as its sibling, which is what
      # the `../assets/...` image paths in the markdown resolve to.
      - name: Build site
        run: |
          set -ex

          docker run --rm --init \
            -v "./site":/app/docs \
            -v "./assets":/app/assets \
            -e MDX \
            -e DIST_DIR \
            -e OUTPUT \
            -e BASE_PATH \
            -e STATIC_PAGE_GENERATION_TIMEOUT \
            -e HOME_REDIRECT \
            -e NAV_ORDER \
            -e NAV_LABELS \
            -e NEXT_PUBLIC_LOCALE \
            -e NEXT_PUBLIC_LIBNAME \
            -e NEXT_PUBLIC_LIBNAME_SHORT \
            -e NEXT_PUBLIC_LIBNAME_DOTSUFFIX_LABEL \
            -e GITHUB \
            -e THEME_PRIMARY \
            -e THEME_SCHEME \
            -e THEME_CONTRAST \
            -e THEME_NOTE \
            -e THEME_TIP \
            -e THEME_IMPORTANT \
            -e THEME_WARNING \
            -e THEME_CAUTION \
            ghcr.io/thiagocajadev/do-docs:3 pnpm run build
        env:
          # Paths are relative to /app inside the container, where ./site is mounted as docs.
          MDX: docs
          DIST_DIR: docs/out${{ steps.pages.outputs.base_path }}
          OUTPUT: export
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          STATIC_PAGE_GENERATION_TIMEOUT: "300"
          HOME_REDIRECT: /javascript/readme
          # Ordem e agrupamento da sidebar. Pastas fora daqui vão para o fim, sem grupo.
          NAV_ORDER: |
            Estrutura:
              - html
              - javascript
              - css
            Programação:
              - csharp
              - typescript
            Banco de Dados:
              - sql
            Conceitos:
              - shared
          # Nomes exibidos, para os slugs que a capitalização automática erra (sql -> Sql).
          NAV_LABELS: |
            html: HTML
            css: CSS
            sql: SQL
            javascript: JavaScript
            typescript: TypeScript
            csharp: C#
            shared: Compartilhado
          NEXT_PUBLIC_LOCALE: pt-BR
          NEXT_PUBLIC_LIBNAME: Code Style
          NEXT_PUBLIC_LIBNAME_SHORT: code-style
          NEXT_PUBLIC_LIBNAME_DOTSUFFIX_LABEL: docs
          GITHUB: https://github.com/thiagocajadev/code-style
          THEME_PRIMARY: "#1f6feb"
          THEME_SCHEME: tonalSpot
          THEME_CONTRAST: "0"
          THEME_NOTE: "#1f6feb"
          THEME_TIP: "#238636"
          THEME_IMPORTANT: "#8957e5"
          THEME_WARNING: "#d29922"
          THEME_CAUTION: "#da3633"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/out${{ steps.pages.outputs.base_path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
