name: Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" \
                      /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h /

      - name: Checkout code-style
        uses: actions/checkout@v4
        with:
          path: code-style

      - name: Checkout pmndrs/docs fork
        uses: actions/checkout@v4
        with:
          repository: thiagocajadev/docs
          ref: main
          path: docs-renderer

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: docs-renderer/pnpm-lock.yaml

      - name: Sync docs content into renderer
        run: |
          rm -rf docs-renderer/docs
          mkdir -p docs-renderer/docs
          # Escopo reduzido enquanto o build não cabe no runner free.
          # Ampliar adicionando subpastas conforme o disco permitir.
          cp -r code-style/docs/javascript docs-renderer/docs/javascript
          cp -r code-style/docs/shared docs-renderer/docs/shared
          cp -r code-style/assets docs-renderer/assets

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: docs-renderer/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('docs-renderer/pnpm-lock.yaml') }}-${{ hashFiles('code-style/docs/**/*.md') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('docs-renderer/pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        working-directory: docs-renderer
        run: pnpm install --frozen-lockfile

      - name: Build site
        working-directory: docs-renderer
        env:
          MDX: docs
          DIST_DIR: out
          OUTPUT: export
          STATIC_PAGE_GENERATION_TIMEOUT: "300"
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          HOME_REDIRECT: /javascript/readme
          NEXT_PUBLIC_LIBNAME: Code Style
          NEXT_PUBLIC_LIBNAME_SHORT: code-style
          NEXT_PUBLIC_LIBNAME_DOTSUFFIX_LABEL: docs
          GITHUB: https://github.com/thiagocajadev/code-style
          THEME_PRIMARY: "#1f6feb"
          THEME_SCHEME: tonalSpot
          THEME_CONTRAST: "0"
          THEME_NOTE: "#1f6feb"
          THEME_TIP: "#238636"
          THEME_IMPORTANT: "#8957e5"
          THEME_WARNING: "#d29922"
          THEME_CAUTION: "#da3633"
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-renderer/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
